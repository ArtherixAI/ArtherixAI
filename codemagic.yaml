workflows:
  ios-workflow:
    name: ArtherixAI Build

    environment:
      xcode: latest
      cocoapods: default

    scripts:
      - name: Build iOS app
        script: |
          xcodebuild clean build \
          -scheme ArtherixAI \
          -sdk iphoneos \
          -configuration Release \
          CODE_SIGNING_ALLOWED=NO

    artifacts:
      - build/**/*.app
